version: "3.9"

# ─── Shared network — every service can talk to every other by name ────────────
networks:
  hub:
    driver: bridge

# ─── Named volumes — data survives container restarts ─────────────────────────
volumes:
  n8n_data:
  pnpm_store:

# ─────────────────────────────────────────────────────────────────────────────
services:

  # ── MCP Automation Hub (your Node/TypeScript server) ────────────────────────
  mcp:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    container_name: mcp-hub
    volumes:
      # Mount your entire repo into /workspace — edits in VS Code show up here
      - .:/workspace:cached
      # Persist the pnpm store so installs are fast across rebuilds
      - pnpm_store:/workspace/node_modules
    ports:
      - "3000:3000"
    env_file:
      - .env          # your real secrets — never committed
    environment:
      - NODE_ENV=development
      - MCP_SERVER_PORT=3000
    networks:
      - hub
    depends_on:
      - n8n
    # Keep alive for VS Code to attach; swap for `pnpm dev` when running standalone
    command: sleep infinity
    restart: unless-stopped

  # ── n8n Workflow Automation ──────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "5678:5678"
    env_file:
      - .env
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/Chicago
      # Allow n8n to call back to the MCP server by service name
      - N8N_RUNNERS_ENABLED=true
    networks:
      - hub
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
